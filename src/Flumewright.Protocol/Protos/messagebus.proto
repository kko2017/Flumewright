syntax = "proto3";
package fw.v1;
option csharp_namespace = "Flumewright.Protocol";

service MessageBus {
  // M1: unary publish (streaming deferred to M5). Ack/Admin deferred to M3.
  rpc Publish(PublishEnvelope) returns (PublishAck);
  // M1: server-streaming subscribe — the PubSub essence, kept from the start.
  rpc Subscribe(SubscribeRequest) returns (stream DeliverEnvelope);
  // M3a: manual batch commit of offsets
  rpc CommitOffset(CommitRequest) returns (CommitAck);

  // M3c: group coordination
  rpc JoinGroup(JoinGroupRequest) returns (JoinGroupResponse);
  rpc SyncGroup(SyncGroupRequest) returns (SyncGroupResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc LeaveGroup(LeaveGroupRequest) returns (LeaveGroupResponse);
}

message PublishEnvelope {
  string topic = 1;
  map<string, string> headers = 2;   // content-type, schema_id, etc.
  bytes  payload = 3;                 // opaque — broker never deserializes (ADR 0001)
  string client_msg_id = 4;
  bytes  partition_key = 5;
}

message PublishAck {
  string client_msg_id = 1;
  string topic = 2;
  int64  offset = 3;
  bool   accepted = 4;
  string error = 5;
  int32  partition = 6;
}

message SubscribeRequest {
  string topic = 1;
  string group_id = 2;
  repeated int32 partitions = 3;
  OffsetReset reset = 4;
}

enum OffsetReset {
  EARLIEST = 0;
  LATEST = 1;
}

message DeliverEnvelope {
  string topic = 1;
  int64  offset = 2;
  map<string, string> headers = 3;
  bytes  payload = 4;
  int32  partition = 5;
}

message CommitRequest {
  string group_id = 1;
  string topic = 2;
  int32 partition = 3;
  int64 offset = 4;
  int32 generation = 5;
}

enum GroupErrorCode {
  GROUP_OK = 0;
  GROUP_FENCED = 1;                 // stale generation -> rejoin
  GROUP_REBALANCE_IN_PROGRESS = 2;
  GROUP_UNKNOWN_MEMBER = 3;
}

message CommitAck {
  bool ok = 1;
  string reason = 2;
  GroupErrorCode code = 3;
}

message JoinGroupRequest {
  string group_id = 1;
  string member_id = 2;
  repeated string topics = 3;
}

message MemberMetadata {
  string member_id = 1;
  repeated string topics = 2;
}

message JoinGroupResponse {
  bool ok = 1;
  string reason = 2;
  int32 generation = 3;
  string member_id = 4;
  bool is_leader = 5;
  repeated MemberMetadata members = 6;
  GroupErrorCode code = 7;
}

message MemberAssignment {
  string member_id = 1;
  string topic = 2;
  repeated int32 partitions = 3;
}

message SyncGroupRequest {
  string group_id = 1;
  string member_id = 2;
  int32 generation = 3;
  repeated MemberAssignment assignments = 4;
}

message SyncGroupResponse {
  bool ok = 1;
  string reason = 2;
  repeated MemberAssignment assignments = 3;
  int32 generation = 4;
  GroupErrorCode code = 5;
}

message HeartbeatRequest {
  string group_id = 1;
  string member_id = 2;
  int32 generation = 3;
}

message HeartbeatResponse {
  bool ok = 1;
  string reason = 2;
  bool rebalance_in_progress = 3;
  GroupErrorCode code = 4;
}

message LeaveGroupRequest {
  string group_id = 1;
  string member_id = 2;
}

message LeaveGroupResponse {
  bool ok = 1;
}
