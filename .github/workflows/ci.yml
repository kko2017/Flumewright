name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1
        with:
          dotnet-version: '8.0.x'

      - name: Cache SonarCloud packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarCloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.dotnet/tools
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Cache NuGet packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Install SonarCloud scanner
        run: |
          dotnet tool install --global dotnet-sonarscanner || dotnet tool update --global dotnet-sonarscanner
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Restore
        run: dotnet restore

      - name: Build and analyze with SonarCloud
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet sonarscanner begin /k:"FFXD_kko2017_Flumewright_1928394" /o:"alex-oh-sonar81823" /d:sonar.token="$SONAR_TOKEN" /d:sonar.host.url="https://sonarcloud.io" /d:sonar.cs.opencover.reportsPaths="**/TestResults/**/coverage.opencover.xml" /d:sonar.cs.vstest.reportsPaths="**/TestResults/*.trx" /d:sonar.coverage.exclusions="**/Program.cs,**/obj/**,**/*.g.cs,**/Flumewright.Protocol/**,**/Flumewright.Observability/**,**/Flumewright.Security/**"
          dotnet build --no-incremental -c Release
          dotnet test -c Release --filter "Category!=Load&FullyQualifiedName!~Flumewright.ConcurrencyTests" --collect:"XPlat Code Coverage" --logger "trx;LogFileName=test-results.trx" --results-directory TestResults -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover
          dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"

      - name: Run Coyote Tests
        run: |
          set -o pipefail
          dotnet tool restore
          dotnet build tests/Flumewright.ConcurrencyTests -c Release -t:CoyoteRewriteTarget
          dotnet test tests/Flumewright.ConcurrencyTests -c Release --no-build \
            --logger "console;verbosity=detailed" \
            --logger "trx;LogFileName=coyote-results.trx" --results-directory TestResults \
            2>&1 | tee coyote-output.txt
          explored100=$(grep -c "Explored 100 execution paths" coyote-output.txt || true)
          explored1=$(grep -c "Explored 1 execution path" coyote-output.txt || true)
          echo "Coyote: $explored100 tests explored ~100 paths; $explored1 explored only 1"
          if [ "$explored100" -lt 5 ] || [ "$explored1" -gt 0 ]; then
            echo "::error::Coyote did not actually explore (~100 expected for all 5 tests). Rewrite likely not applied — see FIX-016."
            exit 1
          fi

      - name: Publish test results
        uses: dorny/test-reporter@3eeb9fc888e82e8be2fb356bbeec2750231672bc
        if: always()
        with:
          name: 'Test Results'
          path: 'TestResults/*.trx'
          reporter: dotnet-trx

      - name: Publish broker (dev build)
        run: >
          dotnet publish src/Flumewright.Broker
          --configuration Release
          --output ./publish/broker

      - name: Upload dev artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: flumewright-broker-dev-${{ github.sha }}
          path: ./publish/broker
          retention-days: 14
