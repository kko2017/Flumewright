name: "CodeQL"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 8 * * 1'   # weekly, Monday 08:00 UTC

jobs:
  analyze:
    name: Analyze (csharp)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@<CHECKOUT_SHA>   # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@<CODEQL_SHA>   # v4
        with:
          languages: csharp
          build-mode: autobuild

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@<CODEQL_SHA>   # v4
        with:
          category: "/language:csharp"
